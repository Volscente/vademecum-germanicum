services:
  db:
    image: postgres:15-alpine
    container_name: vademecum_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT}:5432"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: vademecum_backend
    environment:
      # We construct the URL using the variables from .env
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST_DOCKER}:${POSTGRES_PORT}/${POSTGRES_DB}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-gemini/gemini-2.0-flash}
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  postgres_data:
